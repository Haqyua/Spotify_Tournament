<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spotify Tournament</title>
</head>
<body>

<input id="playlistUrl" placeholder="Lien playlist Spotify" style="width: 400px;">
<button onclick="start()">Start</button>

<div id="app" style="margin-top: 20px;"></div>

<script>
const CLIENT_ID = "22522b51012f4caeb90b48d7f2b881f9";
const REDIRECT_URI = "https://haqyua.github.io/Spotify_Tournament/";

let accessToken = null;
let currentRound = [];
let nextRound = [];
let index = 0;

function setMessage(message) {
  document.getElementById("app").innerHTML = `<p>${message}</p>`;
}

// -------- PKCE --------
async function generatePKCE() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);

  const verifier = btoa(String.fromCharCode(...array))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");

  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);

  const challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");

  return { verifier, challenge };
}

async function redirectToAuth() {
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem("verifier", verifier);

  const url =
    "https://accounts.spotify.com/authorize" +
    "?client_id=" + encodeURIComponent(CLIENT_ID) +
    "&response_type=code" +
    "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
    "&code_challenge_method=S256" +
    "&code_challenge=" + encodeURIComponent(challenge) +
    "&scope=" + encodeURIComponent("playlist-read-private playlist-read-collaborative");

  window.location.href = url;
}

function getCode() {
  const params = new URLSearchParams(window.location.search);
  return params.get("code");
}

async function fetchAccessToken() {
  const code = getCode();
  if (!code) return null;

  const verifier = localStorage.getItem("verifier");
  if (!verifier) {
    setMessage("Code PKCE manquant.");
    return null;
  }

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code: code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    })
  });

  const data = await res.json();

  if (!res.ok) {
    console.error("Erreur token :", data);
    setMessage("Erreur lors de la récupération du token Spotify.");
    return null;
  }

  window.history.replaceState({}, document.title, REDIRECT_URI);
  return data.access_token;
}

// -------- PLAYLIST --------
function getPlaylistId(url) {
  const match = url.match(/playlist\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

async function getAllTracks(playlistId, token) {
  let tracks = [];
  let url = `https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=100`;

  while (url) {
    const res = await fetch(url, {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    if (!res.ok) {
      console.error("Erreur playlist :", data);
      throw new Error(data.error?.message || "Erreur API Spotify");
    }

    tracks.push(...data.items.map(i => i.track).filter(t => t));
    url = data.next;
  }

  return tracks;
}

// -------- SHUFFLE --------
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// -------- SAVE --------
function saveState() {
  localStorage.setItem("tournament", JSON.stringify({
    currentRound,
    nextRound,
    index
  }));
}

function loadState() {
  const data = localStorage.getItem("tournament");
  if (!data) return false;

  const parsed = JSON.parse(data);
  currentRound = parsed.currentRound;
  nextRound = parsed.nextRound;
  index = parsed.index;
  return true;
}

// -------- UI --------
function renderTrack(t, side) {
  const imageUrl = t.album?.images?.[0]?.url || "";
  const artists = t.artists?.map(a => a.name).join(", ") || "Artiste inconnu";

  return `
    <div style="width:45%;display:inline-block;text-align:center;vertical-align:top;padding:10px;">
      ${imageUrl ? `<img src="${imageUrl}" width="150"><br>` : ""}
      <b>${t.name}</b><br>
      ${artists}<br><br>
      <button onclick="vote(${side})">Choisir</button>
    </div>
  `;
}

function showMatch() {
  if (index >= currentRound.length) {
    if (nextRound.length === 1) {
      localStorage.removeItem("tournament");
      document.getElementById("app").innerHTML =
        "<h2>Gagnant :</h2>" + renderTrack(nextRound[0], 0);
      return;
    }

    currentRound = nextRound;
    nextRound = [];
    index = 0;
  }

  const a = currentRound[index];
  const b = currentRound[index + 1];

  if (!b) {
    nextRound.push(a);
    index += 2;
    saveState();
    showMatch();
    return;
  }

  document.getElementById("app").innerHTML =
    `<p>Match ${Math.floor(index / 2) + 1}</p>` +
    renderTrack(a, 0) +
    renderTrack(b, 1);

  saveState();
}

// -------- VOTE --------
function vote(choice) {
  nextRound.push(currentRound[index + choice]);
  index += 2;
  showMatch();
}

// -------- START --------
async function start() {
  try {
    setMessage("Chargement...");

    if (!CLIENT_ID) {
      setMessage("CLIENT_ID manquant.");
      return;
    }

    if (!REDIRECT_URI) {
      setMessage("REDIRECT_URI manquant.");
      return;
    }

    if (!accessToken) {
      accessToken = await fetchAccessToken();
    }

    if (!accessToken) {
      await redirectToAuth();
      return;
    }

    const url = document.getElementById("playlistUrl").value.trim();
    const id = getPlaylistId(url);

    if (!id) {
      setMessage("Lien de playlist invalide.");
      return;
    }

    let tracks = await getAllTracks(id, accessToken);
    tracks = tracks.filter(t => t && t.name);

    if (tracks.length === 0) {
      setMessage("Aucune musique trouvée dans cette playlist.");
      return;
    }

    shuffle(tracks);

    currentRound = tracks;
    nextRound = [];
    index = 0;

    saveState();
    showMatch();
  } catch (error) {
    console.error(error);
    setMessage("Erreur : " + error.message);
  }
}

// -------- AUTO LOAD --------
window.onload = async () => {
  try {
    accessToken = await fetchAccessToken();

    if (loadState()) {
      showMatch();
    }
  } catch (error) {
    console.error(error);
    setMessage("Erreur au chargement : " + error.message);
  }
};
</script>

</body>
</html>
