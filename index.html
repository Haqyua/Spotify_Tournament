<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Playlist Tournament</title>
</head>
<body style="margin:0; background:#f6f7fb; font-family:Arial, sans-serif; color:#1f2937;">
  <div style="max-width:1200px; margin:0 auto; padding:24px 16px 40px;">

    <h1 style="margin:0 0 20px; font-size:32px;">Playlist Tournament</h1>

    <div style="background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:16px; margin-bottom:16px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <input
          id="playlistUrl"
          placeholder="Lien playlist Spotify"
          style="flex:1; min-width:320px; padding:12px 14px; font-size:16px; border:1px solid #d1d5db; border-radius:10px;"
        >
        <button onclick="start()" style="padding:12px 16px; font-size:16px; border:none; border-radius:10px; background:#111827; color:#fff; cursor:pointer;">Start</button>
        <button onclick="undoLastSelection()" id="undoButton" style="padding:12px 16px; font-size:16px; border:none; border-radius:10px; background:#e5e7eb; cursor:pointer;">Undo</button>
        <button onclick="resetTournament()" style="padding:12px 16px; font-size:16px; border:none; border-radius:10px; background:#e5e7eb; cursor:pointer;">Reset</button>
        <button onclick="reconnectSpotify()" style="padding:12px 16px; font-size:16px; border:none; border-radius:10px; background:#e5e7eb; cursor:pointer;">Reconnect Spotify</button>
        <button onclick="toggleQualified()" id="toggleQualifiedButton" style="padding:12px 16px; font-size:16px; border:none; border-radius:10px; background:#e5e7eb; cursor:pointer;">Masquer qualifiés</button>
      </div>

      <div style="margin-top:16px; font-size:14px; color:#4b5563;">
        Raccourcis :
        <b>←</b> gauche,
        <b>→</b> droite,
        <b>Z</b> undo
      </div>
    </div>

    <div id="status" style="margin-bottom:16px;"></div>

    <div id="dashboard" style="display:none; gap:16px; margin-bottom:16px;">
      <div style="background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:16px; flex:1;">
        <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:10px;">
          <div id="progressText" style="font-weight:bold;">Progression</div>
          <div id="roundInfo" style="color:#4b5563;"></div>
        </div>

        <div style="width:100%; height:14px; background:#e5e7eb; border-radius:999px; overflow:hidden;">
          <div id="progressBar" style="height:100%; width:0%; background:#111827;"></div>
        </div>

        <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:14px; color:#4b5563;">
          <div id="globalMatchesInfo"></div>
          <div id="roundMatchesInfo"></div>
        </div>
      </div>
    </div>

    <div style="display:grid; grid-template-columns: minmax(0, 1fr) 320px; gap:16px;">
      <div id="app"></div>

      <div id="qualifiedPanel" style="background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:16px; height:fit-content;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <h2 style="margin:0; font-size:18px;">Qualifiés</h2>
          <span id="qualifiedCount" style="font-size:13px; color:#6b7280;">0</span>
        </div>
        <div id="qualifiedList" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>
    </div>
  </div>

<script>
const CONFIG = {
  clientId: "22522b51012f4caeb90b48d7f2b881f9",
  redirectUri: "https://haqyua.github.io/Spotify_Tournament/",
  scopes: ["playlist-read-private", "playlist-read-collaborative"].join(" "),
  byeDelay: 1200
};

const STORAGE = {
  verifier: "spotify_pkce_verifier",
  playlistUrl: "spotify_playlist_url",
  pendingStart: "spotify_pending_start",
  tournament: "spotify_tournament_state",
  qualifiedVisible: "spotify_qualified_visible"
};

const state = {
  accessToken: null,
  currentRound: [],
  nextRound: [],
  index: 0,
  roundNumber: 1,
  roundByeTrack: null,
  lastUndoSnapshot: null,
  byeTimeout: null,
  totalTracks: 0,
  qualifiedVisible: true,
  currentLeftTrack: null,
  currentRightTrack: null,
  finalRanking: [],
  matchHistory: [],
  roundEliminatedMap: {}
};

// -------- DOM --------
const $ = id => document.getElementById(id);

function setStatus(message = "") {
  $("status").innerHTML = message ? `<div style="background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:14px;">${escapeHtml(message)}</div>` : "";
}

function setError(message = "Erreur inconnue.") {
  $("status").innerHTML = `<div style="background:#fff1f2; border:1px solid #fecdd3; color:#9f1239; border-radius:16px; padding:14px;"><b>Erreur :</b> ${escapeHtml(message)}</div>`;
}

function setApp(html = "") {
  $("app").innerHTML = html;
}

function updateUndoButton() {
  const enabled = !!state.lastUndoSnapshot;
  $("undoButton").disabled = !enabled;
  $("undoButton").style.opacity = enabled ? "1" : "0.5";
  $("undoButton").style.cursor = enabled ? "pointer" : "not-allowed";
}

// -------- UTILS --------
function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function randomString(length = 64) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const array = new Uint8Array(length);
  crypto.getRandomValues(array);
  return Array.from(array, x => chars[x % chars.length]).join("");
}

async function sha256(text) {
  return await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
}

function base64UrlEncode(bytes) {
  let binary = "";
  const arr = new Uint8Array(bytes);
  for (let i = 0; i < arr.length; i++) binary += String.fromCharCode(arr[i]);
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function stopByeTimeout() {
  if (state.byeTimeout) {
    clearTimeout(state.byeTimeout);
    state.byeTimeout = null;
  }
}

function getPlaylistId(url) {
  const match = url.match(/playlist\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

function simplifyTrack(track) {
  return {
    id: track.id || "",
    name: track.name || "Titre inconnu",
    artists: (track.artists || []).map(a => ({ name: a.name || "Artiste inconnu" })),
    album: {
      images: track.album?.images?.[0]?.url ? [{ url: track.album.images[0].url }] : [],
      name: track.album?.name || "Album inconnu",
      release_date: track.album?.release_date || ""
    },
    external_urls: {
      spotify: track.external_urls?.spotify || "#"
    },
    duration_ms: track.duration_ms || 0,
    popularity: typeof track.popularity === "number" ? track.popularity : null,
    explicit: !!track.explicit,
    type: "track"
  };
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function getArtistNames(track) {
  return (track.artists || []).map(a => a.name).join(", ") || "Artiste inconnu";
}

function formatDuration(ms) {
  if (!ms) return "Inconnue";
  const totalSeconds = Math.floor(ms / 1000);
  const min = Math.floor(totalSeconds / 60);
  const sec = totalSeconds % 60;
  return `${min}:${String(sec).padStart(2, "0")}`;
}

function getYearFromDate(date) {
  return date ? String(date).slice(0, 4) : "—";
}

function trackKey(track) {
  return track?.id || "";
}

// -------- STORAGE --------
function savePlaylistUrl() {
  localStorage.setItem(STORAGE.playlistUrl, $("playlistUrl").value.trim());
}

function restorePlaylistUrl() {
  const saved = localStorage.getItem(STORAGE.playlistUrl);
  if (saved) $("playlistUrl").value = saved;
}

function setPendingStart(value) {
  localStorage.setItem(STORAGE.pendingStart, value ? "1" : "0");
}

function getPendingStart() {
  return localStorage.getItem(STORAGE.pendingStart) === "1";
}

function clearPendingStart() {
  localStorage.removeItem(STORAGE.pendingStart);
}

function saveQualifiedVisibility() {
  localStorage.setItem(STORAGE.qualifiedVisible, state.qualifiedVisible ? "1" : "0");
}

function loadQualifiedVisibility() {
  state.qualifiedVisible = localStorage.getItem(STORAGE.qualifiedVisible) !== "0";
}

function saveTournament() {
  try {
    localStorage.setItem(STORAGE.tournament, JSON.stringify({
      currentRound: state.currentRound,
      nextRound: state.nextRound,
      index: state.index,
      roundNumber: state.roundNumber,
      roundByeTrack: state.roundByeTrack,
      totalTracks: state.totalTracks,
      finalRanking: state.finalRanking,
      matchHistory: state.matchHistory,
      roundEliminatedMap: state.roundEliminatedMap
    }));
  } catch (error) {
    console.error("Erreur sauvegarde localStorage :", error);
    setStatus("Sauvegarde locale désactivée pour cette playlist trop volumineuse.");
  }
}

function loadTournament() {
  const raw = localStorage.getItem(STORAGE.tournament);
  if (!raw) return false;

  const data = JSON.parse(raw);
  state.currentRound = data.currentRound || [];
  state.nextRound = data.nextRound || [];
  state.index = data.index || 0;
  state.roundNumber = data.roundNumber || 1;
  state.roundByeTrack = data.roundByeTrack || null;
  state.totalTracks = data.totalTracks || 0;
  state.finalRanking = data.finalRanking || [];
  state.matchHistory = data.matchHistory || [];
  state.roundEliminatedMap = data.roundEliminatedMap || {};
  state.lastUndoSnapshot = null;
  updateUndoButton();

  return state.currentRound.length > 0 || state.nextRound.length > 0;
}

function clearTournament() {
  localStorage.removeItem(STORAGE.tournament);
}

// -------- AUTH --------
async function generatePKCE() {
  const verifier = randomString(64);
  const challenge = base64UrlEncode(await sha256(verifier));
  return { verifier, challenge };
}

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

async function redirectToAuth() {
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem(STORAGE.verifier, verifier);

  const authState = randomString(24);
  sessionStorage.setItem("spotify_auth_state", authState);

  const authUrl = new URL("https://accounts.spotify.com/authorize");
  authUrl.search = new URLSearchParams({
    client_id: CONFIG.clientId,
    response_type: "code",
    redirect_uri: CONFIG.redirectUri,
    code_challenge_method: "S256",
    code_challenge: challenge,
    scope: CONFIG.scopes,
    state: authState
  }).toString();

  window.location.href = authUrl.toString();
}

async function fetchAccessToken() {
  const authError = getQueryParam("error");
  if (authError) throw new Error("Autorisation Spotify refusée : " + authError);

  const code = getQueryParam("code");
  if (!code) return null;

  const returnedState = getQueryParam("state");
  const expectedState = sessionStorage.getItem("spotify_auth_state");
  if (expectedState && returnedState !== expectedState) {
    throw new Error("État d'autorisation invalide.");
  }

  const verifier = localStorage.getItem(STORAGE.verifier);
  if (!verifier) throw new Error("Code verifier PKCE introuvable.");

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: CONFIG.clientId,
      grant_type: "authorization_code",
      code,
      redirect_uri: CONFIG.redirectUri,
      code_verifier: verifier
    })
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.error || "Échec de récupération du token.");

  window.history.replaceState({}, document.title, CONFIG.redirectUri);
  return data.access_token;
}

function reconnectSpotify() {
  savePlaylistUrl();
  setPendingStart(true);
  redirectToAuth();
}

// -------- SPOTIFY API --------
async function spotifyApiFetch(url) {
  if (!state.accessToken) throw new Error("NOT_AUTHENTICATED");

  const res = await fetch(url, {
    headers: { Authorization: "Bearer " + state.accessToken }
  });

  const data = await res.json();

  if (!res.ok) {
    const message = data.error?.message || "Erreur API Spotify";
    if (
      res.status === 401 ||
      message.toLowerCase().includes("token expired") ||
      message.toLowerCase().includes("access token expired")
    ) {
      state.accessToken = null;
      throw new Error("TOKEN_EXPIRED");
    }
    throw new Error(message);
  }

  return data;
}

async function getPlaylistMeta(playlistId) {
  const url = `https://api.spotify.com/v1/playlists/${playlistId}?fields=name,tracks(total),owner(display_name,id),public,collaborative`;
  return await spotifyApiFetch(url);
}

async function getAllTracks(playlistId) {
  let tracks = [];
  let offset = 0;
  let total = null;

  while (true) {
    const url = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50&offset=${offset}&additional_types=track`;
    const data = await spotifyApiFetch(url);

    if (total === null) total = data.total ?? 0;

    const batch = (data.items || [])
      .map(entry => entry.item || entry.track)
      .filter(track => track && track.type === "track" && track.name)
      .map(simplifyTrack);

    tracks.push(...batch);

    if (!data.next) break;
    offset += 50;
  }

  return { tracks, total };
}

// -------- TOURNAMENT --------
function resetTournamentData() {
  state.currentRound = [];
  state.nextRound = [];
  state.index = 0;
  state.roundNumber = 1;
  state.roundByeTrack = null;
  state.lastUndoSnapshot = null;
  state.totalTracks = 0;
  state.currentLeftTrack = null;
  state.currentRightTrack = null;
  state.finalRanking = [];
  state.matchHistory = [];
  state.roundEliminatedMap = {};
  updateUndoButton();
}

function prepareRound() {
  state.roundByeTrack = null;

  if (state.currentRound.length > 1 && state.currentRound.length % 2 === 1) {
    const byeIndex = Math.floor(Math.random() * state.currentRound.length);
    state.roundByeTrack = state.currentRound[byeIndex];
    state.currentRound.splice(byeIndex, 1);
    state.currentRound.push(state.roundByeTrack);
  }
}

function createUndoSnapshot() {
  return {
    currentRound: [...state.currentRound],
    nextRound: [...state.nextRound],
    index: state.index,
    roundNumber: state.roundNumber,
    roundByeTrack: state.roundByeTrack,
    finalRanking: [...state.finalRanking],
    matchHistory: [...state.matchHistory],
    roundEliminatedMap: { ...state.roundEliminatedMap }
  };
}

function undoLastSelection() {
  stopByeTimeout();
  if (!state.lastUndoSnapshot) return;

  state.currentRound = [...state.lastUndoSnapshot.currentRound];
  state.nextRound = [...state.lastUndoSnapshot.nextRound];
  state.index = state.lastUndoSnapshot.index;
  state.roundNumber = state.lastUndoSnapshot.roundNumber;
  state.roundByeTrack = state.lastUndoSnapshot.roundByeTrack || null;
  state.finalRanking = [...state.lastUndoSnapshot.finalRanking];
  state.matchHistory = [...state.lastUndoSnapshot.matchHistory];
  state.roundEliminatedMap = { ...state.lastUndoSnapshot.roundEliminatedMap };
  state.lastUndoSnapshot = null;

  saveTournament();
  updateUndoButton();
  showMatch();
}

function registerMatchResult(winner, loser) {
  const winnerId = trackKey(winner);
  const loserId = trackKey(loser);

  state.matchHistory.push({
    round: state.roundNumber,
    winnerId,
    loserId,
    winnerName: winner.name,
    loserName: loser.name,
    loserArtists: getArtistNames(loser),
    isBye: false
  });

  state.roundEliminatedMap[loserId] = state.roundNumber;
}

function registerBye(track) {
  const id = trackKey(track);

  state.matchHistory.push({
    round: state.roundNumber,
    winnerId: id,
    loserId: null,
    winnerName: track.name,
    loserName: null,
    loserArtists: null,
    isBye: true
  });
}

function buildFinalRanking(winner) {
  const winnerId = trackKey(winner);
  const unique = new Map();
  unique.set(winnerId, winner);

  const ranked = [winner];

  const entries = Object.entries(state.roundEliminatedMap)
    .sort((a, b) => b[1] - a[1]);

  for (const [trackId] of entries) {
    const track = findTrackById(trackId);
    if (track && !unique.has(trackId)) {
      unique.set(trackId, track);
      ranked.push(track);
    }
    if (ranked.length >= 8) break;
  }

  state.finalRanking = ranked.slice(0, 8);
}

function findTrackById(trackId) {
  const pools = [
    ...state.currentRound,
    ...state.nextRound,
    ...state.finalRanking
  ];

  for (const track of pools) {
    if (trackKey(track) === trackId) return track;
  }

  for (const historyItem of state.matchHistory) {
    if (historyItem.winnerId === trackId) {
      const track = [...state.currentRound, ...state.nextRound, ...state.finalRanking].find(t => trackKey(t) === trackId);
      if (track) return track;
    }
  }

  return null;
}

function getWinnerPath(winner) {
  const winnerId = trackKey(winner);

  return state.matchHistory
    .filter(item => item.winnerId === winnerId)
    .sort((a, b) => a.round - b.round)
    .map(item => {
      if (item.isBye) {
        return {
          round: item.round,
          text: "Bye"
        };
      }

      return {
        round: item.round,
        text: `${item.loserName} — ${item.loserArtists}`
      };
    });
}

function vote(choice) {
  stopByeTimeout();

  state.lastUndoSnapshot = createUndoSnapshot();
  updateUndoButton();

  const winner = state.currentRound[state.index + choice];
  const loser = state.currentRound[state.index + (choice === 0 ? 1 : 0)];

  registerMatchResult(winner, loser);

  state.nextRound.push(winner);
  state.index += 2;

  saveTournament();
  showMatch();
}

function resetTournament() {
  stopByeTimeout();
  clearTournament();
  clearPendingStart();
  state.accessToken = null;
  resetTournamentData();
  setApp("");
  updateDashboard();
  renderQualifiedList();
  setStatus("Tournoi réinitialisé.");
}

function toggleQualified() {
  state.qualifiedVisible = !state.qualifiedVisible;
  saveQualifiedVisibility();
  renderQualifiedPanelState();
}

// -------- RENDER --------
function renderTrack(track, side, options = {}) {
  const imageUrl = track.album?.images?.[0]?.url || "";
  const artists = getArtistNames(track);
  const spotifyUrl = track.external_urls?.spotify || "#";
  const showChoose = options.showChoose !== false;

  return `
    <div style="
      flex:1;
      min-width:280px;
      text-align:center;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:18px;
      box-sizing:border-box;
      box-shadow:0 6px 16px rgba(0,0,0,0.04);
    ">
      ${imageUrl ? `<a href="${spotifyUrl}" target="_blank" rel="noopener noreferrer"><img src="${imageUrl}" alt="${escapeHtml(track.name)}" width="220" style="width:100%; max-width:220px; border-radius:12px;"></a><br><br>` : ""}
      <div style="font-size:20px; font-weight:bold; margin-bottom:8px;">${escapeHtml(track.name)}</div>
      <div style="margin-bottom:14px; color:#4b5563;">${escapeHtml(artists)}</div>

      ${showChoose ? `
        <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:12px;">
          <button onclick="vote(${side})" style="padding:12px 18px; font-size:16px; border:none; border-radius:10px; background:#111827; color:#fff; cursor:pointer;">Choisir</button>
        </div>
      ` : ""}

      <div style="font-size:13px; color:#6b7280;">
        Album : ${escapeHtml(track.album?.name || "Album inconnu")} · ${escapeHtml(getYearFromDate(track.album?.release_date))}
      </div>
      <div style="font-size:13px; color:#6b7280; margin-top:4px;">
        Durée : ${escapeHtml(formatDuration(track.duration_ms))}${track.popularity !== null ? ` · Popularité : ${track.popularity}` : ""}${track.explicit ? " · Explicit" : ""}
      </div>
    </div>
  `;
}

function renderBye(track) {
  const imageUrl = track.album?.images?.[0]?.url || "";
  const artists = getArtistNames(track);

  return `
    <div style="
      background:#fff;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      padding:12px;
      text-align:center;
      font-size:12px;
      opacity:0.85;
    ">
      <div style="font-size:11px; font-weight:bold; margin-bottom:8px;">BYE DU TOUR</div>
      ${imageUrl ? `<img src="${imageUrl}" alt="${escapeHtml(track.name)}" width="72" style="border-radius:8px;"><br><br>` : ""}
      <div style="font-weight:bold; margin-bottom:4px;">${escapeHtml(track.name)}</div>
      <div style="color:#6b7280;">${escapeHtml(artists)}</div>
    </div>
  `;
}

function renderQualifiedList() {
  const list = $("qualifiedList");
  const qualified = state.nextRound || [];
  $("qualifiedCount").textContent = `${qualified.length}`;

  if (!state.qualifiedVisible) {
    list.innerHTML = "";
    return;
  }

  if (qualified.length === 0) {
    list.innerHTML = `<div style="font-size:14px; color:#6b7280;">Aucun morceau qualifié pour le moment.</div>`;
    return;
  }

  list.innerHTML = qualified.map((track, index) => `
    <div style="display:flex; gap:10px; align-items:center; padding:8px; border:1px solid #f1f5f9; border-radius:10px;">
      <div style="width:24px; font-size:12px; color:#6b7280;">${index + 1}</div>
      <div style="width:40px;">
        ${track.album?.images?.[0]?.url ? `<img src="${track.album.images[0].url}" width="40" height="40" style="border-radius:8px; object-fit:cover;">` : ""}
      </div>
      <div style="min-width:0; flex:1;">
        <div style="font-size:13px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(track.name)}</div>
        <div style="font-size:12px; color:#6b7280; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(getArtistNames(track))}</div>
      </div>
    </div>
  `).join("");
}

function renderQualifiedPanelState() {
  $("qualifiedPanel").style.display = state.qualifiedVisible ? "block" : "none";
  $("toggleQualifiedButton").textContent = state.qualifiedVisible ? "Masquer qualifiés" : "Afficher qualifiés";
  renderQualifiedList();
}

function updateDashboard() {
  const active = state.currentRound.length > 0 || state.nextRound.length > 0;
  $("dashboard").style.display = active ? "flex" : "none";
  if (!active) return;

  const totalMatches = Math.max(0, state.totalTracks - 1);
  const completedMatches = state.nextRound.length + (state.totalTracks - state.currentRound.length - state.nextRound.length);
  const progressPercent = totalMatches > 0 ? (completedMatches / totalMatches) * 100 : 0;

  const remainingInCurrentRound = Math.max(0, Math.ceil((state.currentRound.length - state.index) / 2));
  const totalInCurrentRound = Math.ceil(state.currentRound.length / 2);

  $("progressBar").style.width = `${progressPercent}%`;
  $("progressText").textContent = `Progression : ${completedMatches} / ${totalMatches} matchs`;
  $("roundInfo").textContent = `Tour ${state.roundNumber}`;
  $("globalMatchesInfo").textContent = `${Math.max(0, totalMatches - completedMatches)} matchs restants au total`;
  $("roundMatchesInfo").textContent = `${remainingInCurrentRound} / ${totalInCurrentRound} matchs restants dans ce tour`;
}

function renderTop8() {
  if (!state.finalRanking.length) return "";

  return `
    <div style="background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:20px; margin-top:16px;">
      <h2 style="margin-top:0;">Top 8 final</h2>
      <div style="display:grid; gap:10px;">
        ${state.finalRanking.map((track, index) => `
          <div style="display:flex; gap:12px; align-items:center; padding:10px; border:1px solid #f1f5f9; border-radius:12px;">
            <div style="width:32px; font-weight:bold; color:#111827;">#${index + 1}</div>
            <div style="width:48px;">
              ${track.album?.images?.[0]?.url ? `<img src="${track.album.images[0].url}" width="48" height="48" style="border-radius:8px; object-fit:cover;">` : ""}
            </div>
            <div style="min-width:0; flex:1;">
              <div style="font-weight:bold;">${escapeHtml(track.name)}</div>
              <div style="font-size:13px; color:#6b7280;">${escapeHtml(getArtistNames(track))}</div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function renderWinnerPath(winner) {
  const path = getWinnerPath(winner);

  return `
    <div style="background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:20px; margin-top:16px;">
      <h2 style="margin-top:0;">Parcours du top 1</h2>
      <div style="display:grid; gap:10px;">
        ${path.length ? path.map(step => `
          <div style="padding:12px; border:1px solid #f1f5f9; border-radius:12px;">
            <div style="font-weight:bold; margin-bottom:4px;">Tour ${step.round}</div>
            <div style="color:#4b5563;">${escapeHtml(step.text)}</div>
          </div>
        `).join("") : `<div style="color:#6b7280;">Aucun parcours disponible.</div>`}
      </div>
    </div>
  `;
}

function showWinner(track) {
  setStatus("");
  state.currentLeftTrack = track;
  state.currentRightTrack = null;

  buildFinalRanking(track);

  setApp(`
    <div style="display:grid; gap:16px;">
      <div style="background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:20px;">
        <h2 style="margin-top:0;">Gagnant</h2>
        <div style="max-width:480px;">
          ${renderTrack(track, 0, { showChoose: false })}
        </div>
      </div>

      ${renderWinnerPath(track)}
      ${renderTop8()}
    </div>
  `);
}

function showMatch() {
  stopByeTimeout();
  updateUndoButton();

  if (state.index >= state.currentRound.length) {
    if (state.nextRound.length === 1) {
      const winner = state.nextRound[0];
      clearTournament();
      state.lastUndoSnapshot = null;
      updateUndoButton();
      updateDashboard();
      renderQualifiedList();
      showWinner(winner);
      return;
    }

    state.currentRound = [...state.nextRound];
    state.nextRound = [];
    state.index = 0;
    state.roundNumber += 1;
    prepareRound();
    saveTournament();
  }

  const a = state.currentRound[state.index];
  const b = state.currentRound[state.index + 1];
  state.currentLeftTrack = a || null;
  state.currentRightTrack = b || null;

  updateDashboard();
  renderQualifiedList();

  if (!b) {
    setStatus("");
    setApp(`
      <div style="display:grid; grid-template-columns:240px minmax(0,1fr); gap:16px;">
        ${renderBye(a)}
        <div style="background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:24px;">
          <p style="margin:0; font-size:20px;"><b>${escapeHtml(a.name)}</b> passe automatiquement au tour suivant.</p>
        </div>
      </div>
    `);

    registerBye(a);

    state.nextRound.push(a);
    state.index += 2;
    saveTournament();
    renderQualifiedList();

    state.byeTimeout = setTimeout(showMatch, CONFIG.byeDelay);
    return;
  }

  setStatus("");
  setApp(`
    <div style="background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:18px;">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:16px;">
        <div><b>Tour ${state.roundNumber} — Match ${Math.floor(state.index / 2) + 1}</b></div>
        <div style="font-size:14px; color:#6b7280;">${state.roundByeTrack ? "Un bye est attribué ce tour" : "Aucun bye ce tour"}</div>
      </div>

      <div style="display:grid; grid-template-columns:220px minmax(0,1fr); gap:16px;">
        <div>
          ${state.roundByeTrack ? renderBye(state.roundByeTrack) : ""}
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          ${renderTrack(a, 0)}
          ${renderTrack(b, 1)}
        </div>
      </div>
    </div>
  `);

  saveTournament();
}

// -------- FLOW --------
async function start() {
  try {
    stopByeTimeout();
    setStatus("Chargement...");

    const playlistUrl = $("playlistUrl").value.trim();
    const playlistId = getPlaylistId(playlistUrl);

    if (!playlistId) throw new Error("Lien de playlist invalide.");

    savePlaylistUrl();

    if (!state.accessToken) {
      state.accessToken = await fetchAccessToken();
    }

    if (!state.accessToken) {
      setPendingStart(true);
      await redirectToAuth();
      return;
    }

    const meta = await getPlaylistMeta(playlistId);
    setStatus(`Lecture de la playlist "${meta.name}"... ${meta.tracks?.total ?? 0} éléments annoncés.`);

    const { tracks, total } = await getAllTracks(playlistId);
    if (tracks.length === 0) {
      throw new Error(`Aucune musique trouvée. Spotify annonce ${total ?? 0} items, mais 0 piste exploitable a été récupérée.`);
    }

    shuffle(tracks);

    resetTournamentData();
    state.currentRound = tracks;
    state.totalTracks = tracks.length;
    prepareRound();

    saveTournament();
    renderQualifiedList();
    renderQualifiedPanelState();
    showMatch();
  } catch (error) {
    console.error(error);

    if (error.message === "TOKEN_EXPIRED" || error.message === "NOT_AUTHENTICATED") {
      setStatus("Session Spotify expirée, reconnexion...");
      savePlaylistUrl();
      setPendingStart(true);
      await redirectToAuth();
      return;
    }

    setError(error.message || "Erreur inconnue.");
  }
}

async function init() {
  try {
    restorePlaylistUrl();
    loadQualifiedVisibility();
    renderQualifiedPanelState();

    const code = getQueryParam("code");
    if (code) {
      setStatus("Connexion Spotify...");
      state.accessToken = await fetchAccessToken();
    }

    if (loadTournament()) {
      renderQualifiedPanelState();
      showMatch();
      return;
    }

    if (getPendingStart()) {
      clearPendingStart();
      await start();
      return;
    }

    updateUndoButton();
    updateDashboard();
    setStatus("");
  } catch (error) {
    console.error(error);
    setError(error.message || "Erreur au chargement.");
  }
}

window.onload = init;

// -------- KEYBOARD --------
document.addEventListener("keydown", (event) => {
  const tag = document.activeElement?.tagName?.toLowerCase();
  const isTyping = tag === "input" || tag === "textarea";
  if (isTyping) return;

  if (event.key === "ArrowLeft" && state.currentLeftTrack && state.currentRightTrack) {
    event.preventDefault();
    vote(0);
  }

  if (event.key === "ArrowRight" && state.currentLeftTrack && state.currentRightTrack) {
    event.preventDefault();
    vote(1);
  }

  if (event.key.toLowerCase() === "z") {
    event.preventDefault();
    undoLastSelection();
  }
});
</script>
</body>
