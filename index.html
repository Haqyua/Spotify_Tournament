<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Playlist Tournament</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 1100px; margin: 30px auto; padding: 0 16px;">

  <h1>Playlist Tournament</h1>

  <div style="margin-bottom: 16px;">
    <input
      id="playlistUrl"
      placeholder="Lien playlist Spotify"
      style="width: 100%; max-width: 700px; padding: 10px; font-size: 16px;"
    >
  </div>

  <div style="margin-bottom: 16px;">
    <button onclick="start()" style="padding: 10px 16px; font-size: 16px;">Start</button>
    <button onclick="undoLastSelection()" id="undoButton" style="padding: 10px 16px; font-size: 16px; margin-left: 8px;">Undo</button>
    <button onclick="resetTournament()" style="padding: 10px 16px; font-size: 16px; margin-left: 8px;">Reset</button>
    <button onclick="reconnectSpotify()" style="padding: 10px 16px; font-size: 16px; margin-left: 8px;">Reconnect Spotify</button>
  </div>

  <div id="status" style="margin-bottom: 16px;"></div>
  <div id="app"></div>

<script>
const CLIENT_ID = "22522b51012f4caeb90b48d7f2b881f9";
const REDIRECT_URI = "https://haqyua.github.io/Spotify_Tournament/";

const STORAGE_KEYS = {
  verifier: "spotify_pkce_verifier",
  playlistUrl: "spotify_playlist_url",
  pendingStart: "spotify_pending_start",
  tournament: "spotify_tournament_state"
};

let accessToken = null;
let currentRound = [];
let nextRound = [];
let index = 0;
let byeTimeout = null;
let roundByeTrack = null;
let roundNumber = 1;
let lastUndoSnapshot = null;

function setStatus(message) {
  document.getElementById("status").innerHTML = `<p>${escapeHtml(message)}</p>`;
}

function setError(message) {
  document.getElementById("status").innerHTML = `<p style="color:#b00020;"><b>Erreur :</b> ${escapeHtml(message)}</p>`;
}

function clearStatus() {
  document.getElementById("status").innerHTML = "";
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function savePlaylistUrl() {
  const value = document.getElementById("playlistUrl").value.trim();
  localStorage.setItem(STORAGE_KEYS.playlistUrl, value);
}

function restorePlaylistUrl() {
  const saved = localStorage.getItem(STORAGE_KEYS.playlistUrl);
  if (saved) {
    document.getElementById("playlistUrl").value = saved;
  }
}

function savePendingStart(value) {
  localStorage.setItem(STORAGE_KEYS.pendingStart, value ? "1" : "0");
}

function getPendingStart() {
  return localStorage.getItem(STORAGE_KEYS.pendingStart) === "1";
}

function clearPendingStart() {
  localStorage.removeItem(STORAGE_KEYS.pendingStart);
}

function updateUndoButton() {
  const button = document.getElementById("undoButton");
  if (!button) return;
  button.disabled = !lastUndoSnapshot;
  button.style.opacity = lastUndoSnapshot ? "1" : "0.5";
  button.style.cursor = lastUndoSnapshot ? "pointer" : "not-allowed";
}

// -------- PKCE --------
function randomString(length = 64) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const array = new Uint8Array(length);
  crypto.getRandomValues(array);
  let result = "";
  for (let i = 0; i < array.length; i++) {
    result += chars[array[i] % chars.length];
  }
  return result;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return await crypto.subtle.digest("SHA-256", data);
}

function base64UrlEncode(bytes) {
  let binary = "";
  const arr = new Uint8Array(bytes);
  for (let i = 0; i < arr.byteLength; i++) {
    binary += String.fromCharCode(arr[i]);
  }
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

async function generatePKCE() {
  const verifier = randomString(64);
  const challenge = base64UrlEncode(await sha256(verifier));
  return { verifier, challenge };
}

async function redirectToAuth() {
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem(STORAGE_KEYS.verifier, verifier);

  const scope = [
    "playlist-read-private",
    "playlist-read-collaborative"
  ].join(" ");

  const state = randomString(24);
  sessionStorage.setItem("spotify_auth_state", state);

  const authUrl = new URL("https://accounts.spotify.com/authorize");
  authUrl.search = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    code_challenge_method: "S256",
    code_challenge: challenge,
    scope,
    state
  }).toString();

  window.location.href = authUrl.toString();
}

function reconnectSpotify() {
  savePendingStart(true);
  savePlaylistUrl();
  redirectToAuth();
}

function getCode() {
  return new URLSearchParams(window.location.search).get("code");
}

function getAuthError() {
  return new URLSearchParams(window.location.search).get("error");
}

function getState() {
  return new URLSearchParams(window.location.search).get("state");
}

async function fetchAccessToken() {
  const authError = getAuthError();
  if (authError) {
    throw new Error("Autorisation Spotify refusée : " + authError);
  }

  const code = getCode();
  if (!code) return null;

  const returnedState = getState();
  const expectedState = sessionStorage.getItem("spotify_auth_state");
  if (expectedState && returnedState !== expectedState) {
    throw new Error("État d'autorisation invalide.");
  }

  const verifier = localStorage.getItem(STORAGE_KEYS.verifier);
  if (!verifier) {
    throw new Error("Code verifier PKCE introuvable.");
  }

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    })
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.error_description || data.error || "Échec de récupération du token.");
  }

  window.history.replaceState({}, document.title, REDIRECT_URI);
  return data.access_token;
}

// -------- PLAYLIST --------
function getPlaylistId(url) {
  const match = url.match(/playlist\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

function simplifyTrack(track) {
  return {
    id: track.id || "",
    name: track.name || "Titre inconnu",
    artists: (track.artists || []).map(a => ({ name: a.name || "Artiste inconnu" })),
    album: {
      images: track.album?.images?.[0]?.url ? [{ url: track.album.images[0].url }] : []
    },
    external_urls: {
      spotify: track.external_urls?.spotify || "#"
    },
    type: "track"
  };
}

async function spotifyApiFetch(url) {
  if (!accessToken) {
    throw new Error("NOT_AUTHENTICATED");
  }

  const res = await fetch(url, {
    headers: {
      Authorization: "Bearer " + accessToken
    }
  });

  const data = await res.json();

  if (!res.ok) {
    const message = data.error?.message || "Erreur API Spotify";

    if (
      res.status === 401 ||
      message.toLowerCase().includes("token expired") ||
      message.toLowerCase().includes("access token expired")
    ) {
      accessToken = null;
      throw new Error("TOKEN_EXPIRED");
    }

    throw new Error(message);
  }

  return data;
}

async function getPlaylistMeta(playlistId) {
  const url = `https://api.spotify.com/v1/playlists/${playlistId}?fields=name,tracks(total),owner(display_name,id),public,collaborative`;
  return await spotifyApiFetch(url);
}

async function getAllTracks(playlistId) {
  let tracks = [];
  let offset = 0;
  let total = null;

  while (true) {
    const url = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50&offset=${offset}&additional_types=track`;
    const data = await spotifyApiFetch(url);

    if (total === null) {
      total = data.total ?? 0;
    }

    const batch = (data.items || [])
      .map(entry => entry.item || entry.track)
      .filter(track => track && track.type === "track" && track.name)
      .map(simplifyTrack);

    tracks.push(...batch);

    if (!data.next) {
      break;
    }

    offset += 50;
  }

  return { tracks, total };
}

// -------- SHUFFLE --------
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function prepareRound() {
  roundByeTrack = null;

  if (currentRound.length > 1 && currentRound.length % 2 === 1) {
    const byeIndex = Math.floor(Math.random() * currentRound.length);
    roundByeTrack = currentRound[byeIndex];
    currentRound.splice(byeIndex, 1);
    currentRound.push(roundByeTrack);
  }
}

// -------- UNDO --------
function createUndoSnapshot() {
  return {
    currentRound: [...currentRound],
    nextRound: [...nextRound],
    index,
    roundNumber,
    roundByeTrack
  };
}

function undoLastSelection() {
  if (byeTimeout) {
    clearTimeout(byeTimeout);
    byeTimeout = null;
  }

  if (!lastUndoSnapshot) {
    return;
  }

  currentRound = [...lastUndoSnapshot.currentRound];
  nextRound = [...lastUndoSnapshot.nextRound];
  index = lastUndoSnapshot.index;
  roundNumber = lastUndoSnapshot.roundNumber;
  roundByeTrack = lastUndoSnapshot.roundByeTrack || null;
  lastUndoSnapshot = null;

  saveState();
  updateUndoButton();
  showMatch();
}

// -------- SAVE / LOAD --------
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEYS.tournament, JSON.stringify({
      currentRound,
      nextRound,
      index,
      roundNumber,
      roundByeTrack
    }));
  } catch (error) {
    console.error("Erreur sauvegarde localStorage :", error);
    setStatus("Sauvegarde locale désactivée pour cette playlist trop volumineuse.");
  }
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEYS.tournament);
  if (!raw) return false;

  const parsed = JSON.parse(raw);
  currentRound = parsed.currentRound || [];
  nextRound = parsed.nextRound || [];
  index = parsed.index || 0;
  roundNumber = parsed.roundNumber || 1;
  roundByeTrack = parsed.roundByeTrack || null;
  lastUndoSnapshot = null;

  updateUndoButton();

  return currentRound.length > 0 || nextRound.length > 0;
}

function clearState() {
  localStorage.removeItem(STORAGE_KEYS.tournament);
}

// -------- UI --------
function renderTrack(t, side) {
  const imageUrl = t.album?.images?.[0]?.url || "";
  const artists = (t.artists || []).map(a => a.name).join(", ") || "Artiste inconnu";
  const spotifyUrl = t.external_urls?.spotify || "#";

  return `
    <div style="
      width: 46%;
      display: inline-block;
      vertical-align: top;
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin: 8px;
      box-sizing: border-box;
    ">
      ${imageUrl ? `<a href="${spotifyUrl}" target="_blank" rel="noopener noreferrer"><img src="${imageUrl}" alt="${escapeHtml(t.name)}" width="180" style="border-radius:8px;"></a><br><br>` : ""}
      <div style="font-size:18px; font-weight:bold; margin-bottom:8px;">${escapeHtml(t.name)}</div>
      <div style="margin-bottom:14px;">${escapeHtml(artists)}</div>
      <button onclick="vote(${side})" style="padding:10px 16px; font-size:16px;">Choisir</button>
    </div>
  `;
}

function renderBye(track) {
  const imageUrl = track.album?.images?.[0]?.url || "";
  const artists = (track.artists || []).map(a => a.name).join(", ") || "Artiste inconnu";

  return `
    <div style="
      width: 18%;
      min-width: 140px;
      display: inline-block;
      vertical-align: top;
      text-align: center;
      opacity: 0.75;
      font-size: 12px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      padding: 10px;
      margin: 8px 12px 8px 0;
      box-sizing: border-box;
    ">
      <div style="font-size:11px; font-weight:bold; margin-bottom:8px;">BYE DU TOUR</div>
      ${imageUrl ? `<img src="${imageUrl}" alt="${escapeHtml(track.name)}" width="70" style="border-radius:6px;"><br><br>` : ""}
      <div style="font-weight:bold; margin-bottom:4px;">${escapeHtml(track.name)}</div>
      <div>${escapeHtml(artists)}</div>
    </div>
  `;
}

function showWinner(track) {
  clearStatus();
  document.getElementById("app").innerHTML = `
    <h2>Gagnant</h2>
    <div style="max-width: 360px;">
      ${renderTrack(track, 0)}
    </div>
  `;
}

function showMatch() {
  if (byeTimeout) {
    clearTimeout(byeTimeout);
    byeTimeout = null;
  }

  updateUndoButton();

  if (index >= currentRound.length) {
    if (nextRound.length === 1) {
      const winner = nextRound[0];
      clearState();
      lastUndoSnapshot = null;
      updateUndoButton();
      showWinner(winner);
      return;
    }

    currentRound = [...nextRound];
    nextRound = [];
    index = 0;
    roundNumber += 1;
    prepareRound();
    saveState();
  }

  const a = currentRound[index];
  const b = currentRound[index + 1];
  const isCurrentBye = !b;

  if (isCurrentBye) {
    clearStatus();
    document.getElementById("app").innerHTML = `
      <p><b>Tour ${roundNumber}</b></p>
      <div style="display:flex; align-items:flex-start; gap:12px;">
        ${renderBye(a)}
        <div style="
          flex:1;
          border:1px solid #ddd;
          border-radius:12px;
          padding:20px;
          margin-top:8px;
        ">
          <p style="margin:0; font-size:18px;"><b>${escapeHtml(a.name)}</b> passe automatiquement au tour suivant.</p>
        </div>
      </div>
    `;

    nextRound.push(a);
    index += 2;
    saveState();

    byeTimeout = setTimeout(() => {
      showMatch();
    }, 1200);

    return;
  }

  clearStatus();
  document.getElementById("app").innerHTML = `
    <p><b>Tour ${roundNumber} — Match ${Math.floor(index / 2) + 1}</b></p>
    <div style="display:flex; align-items:flex-start; gap:12px;">
      <div style="width:18%; min-width:140px;">
        ${roundByeTrack ? renderBye(roundByeTrack) : ""}
      </div>
      <div style="flex:1;">
        ${renderTrack(a, 0)}
        ${renderTrack(b, 1)}
      </div>
    </div>
  `;

  saveState();
}

// -------- VOTE --------
function vote(choice) {
  if (byeTimeout) {
    clearTimeout(byeTimeout);
    byeTimeout = null;
  }

  lastUndoSnapshot = createUndoSnapshot();
  updateUndoButton();

  nextRound.push(currentRound[index + choice]);
  index += 2;

  saveState();
  showMatch();
}

// -------- RESET --------
function resetTournament() {
  if (byeTimeout) {
    clearTimeout(byeTimeout);
    byeTimeout = null;
  }

  clearState();
  clearPendingStart();
  accessToken = null;
  currentRound = [];
  nextRound = [];
  index = 0;
  roundByeTrack = null;
  roundNumber = 1;
  lastUndoSnapshot = null;
  updateUndoButton();
  document.getElementById("app").innerHTML = "";
  setStatus("Tournoi réinitialisé.");
}

// -------- START --------
async function start() {
  try {
    if (byeTimeout) {
      clearTimeout(byeTimeout);
      byeTimeout = null;
    }

    setStatus("Chargement...");

    if (!CLIENT_ID) {
      throw new Error("CLIENT_ID manquant.");
    }

    if (!REDIRECT_URI) {
      throw new Error("REDIRECT_URI manquant.");
    }

    const playlistUrl = document.getElementById("playlistUrl").value.trim();
    const playlistId = getPlaylistId(playlistUrl);

    if (!playlistId) {
      throw new Error("Lien de playlist invalide.");
    }

    savePlaylistUrl();

    if (!accessToken) {
      accessToken = await fetchAccessToken();
    }

    if (!accessToken) {
      savePendingStart(true);
      await redirectToAuth();
      return;
    }

    const meta = await getPlaylistMeta(playlistId);
    setStatus(`Lecture de la playlist "${meta.name}"... ${meta.tracks?.total ?? 0} éléments annoncés.`);

    const result = await getAllTracks(playlistId);
    const tracks = result.tracks;

    if (tracks.length === 0) {
      throw new Error(`Aucune musique trouvée. Spotify annonce ${result.total ?? 0} items, mais 0 piste exploitable a été récupérée.`);
    }

    shuffle(tracks);

    currentRound = tracks;
    nextRound = [];
    index = 0;
    roundNumber = 1;
    lastUndoSnapshot = null;
    prepareRound();

    saveState();
    updateUndoButton();
    showMatch();
  } catch (error) {
    console.error(error);

    if (error.message === "TOKEN_EXPIRED" || error.message === "NOT_AUTHENTICATED") {
      setStatus("Session Spotify expirée, reconnexion...");
      savePendingStart(true);
      savePlaylistUrl();
      await redirectToAuth();
      return;
    }

    setError(error.message || "Erreur inconnue.");
  }
}

// -------- INIT --------
window.onload = async () => {
  try {
    restorePlaylistUrl();

    const code = getCode();
    if (code) {
      setStatus("Connexion Spotify...");
      accessToken = await fetchAccessToken();
    }

    if (loadState()) {
      showMatch();
      return;
    }

    if (getPendingStart()) {
      clearPendingStart();
      await start();
      return;
    }

    updateUndoButton();
    clearStatus();
  } catch (error) {
    console.error(error);
    setError(error.message || "Erreur au chargement.");
  }
};
</script>

</body>
</html>
