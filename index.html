<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Playlist Tournament</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 1100px; margin: 30px auto; padding: 0 16px;">

  <h1>Playlist Tournament</h1>

  <div style="margin-bottom: 16px;">
    <input
      id="playlistUrl"
      placeholder="Lien playlist Spotify"
      style="width: 100%; max-width: 700px; padding: 10px; font-size: 16px;"
    >
  </div>

  <div style="margin-bottom: 16px;">
    <button onclick="start()" style="padding: 10px 16px; font-size: 16px;">Start</button>
    <button onclick="undoLastSelection()" id="undoButton" style="padding: 10px 16px; font-size: 16px; margin-left: 8px;">Undo</button>
    <button onclick="resetTournament()" style="padding: 10px 16px; font-size: 16px; margin-left: 8px;">Reset</button>
    <button onclick="reconnectSpotify()" style="padding: 10px 16px; font-size: 16px; margin-left: 8px;">Reconnect Spotify</button>
  </div>

  <div id="status" style="margin-bottom: 16px;"></div>
  <div id="app"></div>

<script>
const CONFIG = {
  clientId: "22522b51012f4caeb90b48d7f2b881f9",
  redirectUri: "https://haqyua.github.io/Spotify_Tournament/",
  scopes: ["playlist-read-private", "playlist-read-collaborative"].join(" "),
  byeDelay: 1200
};

const STORAGE = {
  verifier: "spotify_pkce_verifier",
  playlistUrl: "spotify_playlist_url",
  pendingStart: "spotify_pending_start",
  tournament: "spotify_tournament_state"
};

const state = {
  accessToken: null,
  currentRound: [],
  nextRound: [],
  index: 0,
  roundNumber: 1,
  roundByeTrack: null,
  lastUndoSnapshot: null,
  byeTimeout: null
};

// -------- DOM --------
const $ = id => document.getElementById(id);

function setStatus(message = "") {
  $("status").innerHTML = message ? `<p>${escapeHtml(message)}</p>` : "";
}

function setError(message = "Erreur inconnue.") {
  $("status").innerHTML = `<p style="color:#b00020;"><b>Erreur :</b> ${escapeHtml(message)}</p>`;
}

function setApp(html = "") {
  $("app").innerHTML = html;
}

function updateUndoButton() {
  const enabled = !!state.lastUndoSnapshot;
  $("undoButton").disabled = !enabled;
  $("undoButton").style.opacity = enabled ? "1" : "0.5";
  $("undoButton").style.cursor = enabled ? "pointer" : "not-allowed";
}

// -------- UTILS --------
function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function randomString(length = 64) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const array = new Uint8Array(length);
  crypto.getRandomValues(array);
  return Array.from(array, x => chars[x % chars.length]).join("");
}

async function sha256(text) {
  return await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
}

function base64UrlEncode(bytes) {
  let binary = "";
  const arr = new Uint8Array(bytes);
  for (let i = 0; i < arr.length; i++) binary += String.fromCharCode(arr[i]);
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function stopByeTimeout() {
  if (state.byeTimeout) {
    clearTimeout(state.byeTimeout);
    state.byeTimeout = null;
  }
}

function getPlaylistId(url) {
  const match = url.match(/playlist\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

function simplifyTrack(track) {
  return {
    id: track.id || "",
    name: track.name || "Titre inconnu",
    artists: (track.artists || []).map(a => ({ name: a.name || "Artiste inconnu" })),
    album: {
      images: track.album?.images?.[0]?.url ? [{ url: track.album.images[0].url }] : []
    },
    external_urls: {
      spotify: track.external_urls?.spotify || "#"
    },
    type: "track"
  };
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// -------- STORAGE --------
function savePlaylistUrl() {
  localStorage.setItem(STORAGE.playlistUrl, $("playlistUrl").value.trim());
}

function restorePlaylistUrl() {
  const saved = localStorage.getItem(STORAGE.playlistUrl);
  if (saved) $("playlistUrl").value = saved;
}

function setPendingStart(value) {
  localStorage.setItem(STORAGE.pendingStart, value ? "1" : "0");
}

function getPendingStart() {
  return localStorage.getItem(STORAGE.pendingStart) === "1";
}

function clearPendingStart() {
  localStorage.removeItem(STORAGE.pendingStart);
}

function saveTournament() {
  try {
    localStorage.setItem(STORAGE.tournament, JSON.stringify({
      currentRound: state.currentRound,
      nextRound: state.nextRound,
      index: state.index,
      roundNumber: state.roundNumber,
      roundByeTrack: state.roundByeTrack
    }));
  } catch (error) {
    console.error("Erreur sauvegarde localStorage :", error);
    setStatus("Sauvegarde locale désactivée pour cette playlist trop volumineuse.");
  }
}

function loadTournament() {
  const raw = localStorage.getItem(STORAGE.tournament);
  if (!raw) return false;

  const data = JSON.parse(raw);
  state.currentRound = data.currentRound || [];
  state.nextRound = data.nextRound || [];
  state.index = data.index || 0;
  state.roundNumber = data.roundNumber || 1;
  state.roundByeTrack = data.roundByeTrack || null;
  state.lastUndoSnapshot = null;
  updateUndoButton();

  return state.currentRound.length > 0 || state.nextRound.length > 0;
}

function clearTournament() {
  localStorage.removeItem(STORAGE.tournament);
}

// -------- AUTH --------
async function generatePKCE() {
  const verifier = randomString(64);
  const challenge = base64UrlEncode(await sha256(verifier));
  return { verifier, challenge };
}

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

async function redirectToAuth() {
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem(STORAGE.verifier, verifier);

  const authState = randomString(24);
  sessionStorage.setItem("spotify_auth_state", authState);

  const authUrl = new URL("https://accounts.spotify.com/authorize");
  authUrl.search = new URLSearchParams({
    client_id: CONFIG.clientId,
    response_type: "code",
    redirect_uri: CONFIG.redirectUri,
    code_challenge_method: "S256",
    code_challenge: challenge,
    scope: CONFIG.scopes,
    state: authState
  }).toString();

  window.location.href = authUrl.toString();
}

async function fetchAccessToken() {
  const authError = getQueryParam("error");
  if (authError) throw new Error("Autorisation Spotify refusée : " + authError);

  const code = getQueryParam("code");
  if (!code) return null;

  const returnedState = getQueryParam("state");
  const expectedState = sessionStorage.getItem("spotify_auth_state");
  if (expectedState && returnedState !== expectedState) {
    throw new Error("État d'autorisation invalide.");
  }

  const verifier = localStorage.getItem(STORAGE.verifier);
  if (!verifier) throw new Error("Code verifier PKCE introuvable.");

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: CONFIG.clientId,
      grant_type: "authorization_code",
      code,
      redirect_uri: CONFIG.redirectUri,
      code_verifier: verifier
    })
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.error || "Échec de récupération du token.");

  window.history.replaceState({}, document.title, CONFIG.redirectUri);
  return data.access_token;
}

function reconnectSpotify() {
  savePlaylistUrl();
  setPendingStart(true);
  redirectToAuth();
}

// -------- SPOTIFY API --------
async function spotifyApiFetch(url) {
  if (!state.accessToken) throw new Error("NOT_AUTHENTICATED");

  const res = await fetch(url, {
    headers: { Authorization: "Bearer " + state.accessToken }
  });

  const data = await res.json();

  if (!res.ok) {
    const message = data.error?.message || "Erreur API Spotify";
    if (
      res.status === 401 ||
      message.toLowerCase().includes("token expired") ||
      message.toLowerCase().includes("access token expired")
    ) {
      state.accessToken = null;
      throw new Error("TOKEN_EXPIRED");
    }
    throw new Error(message);
  }

  return data;
}

async function getPlaylistMeta(playlistId) {
  const url = `https://api.spotify.com/v1/playlists/${playlistId}?fields=name,tracks(total),owner(display_name,id),public,collaborative`;
  return await spotifyApiFetch(url);
}

async function getAllTracks(playlistId) {
  let tracks = [];
  let offset = 0;
  let total = null;

  while (true) {
    const url = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50&offset=${offset}&additional_types=track`;
    const data = await spotifyApiFetch(url);

    if (total === null) total = data.total ?? 0;

    const batch = (data.items || [])
      .map(entry => entry.item || entry.track)
      .filter(track => track && track.type === "track" && track.name)
      .map(simplifyTrack);

    tracks.push(...batch);

    if (!data.next) break;
    offset += 50;
  }

  return { tracks, total };
}

// -------- TOURNAMENT --------
function resetTournamentData() {
  state.currentRound = [];
  state.nextRound = [];
  state.index = 0;
  state.roundNumber = 1;
  state.roundByeTrack = null;
  state.lastUndoSnapshot = null;
  updateUndoButton();
}

function prepareRound() {
  state.roundByeTrack = null;

  if (state.currentRound.length > 1 && state.currentRound.length % 2 === 1) {
    const byeIndex = Math.floor(Math.random() * state.currentRound.length);
    state.roundByeTrack = state.currentRound[byeIndex];
    state.currentRound.splice(byeIndex, 1);
    state.currentRound.push(state.roundByeTrack);
  }
}

function createUndoSnapshot() {
  return {
    currentRound: [...state.currentRound],
    nextRound: [...state.nextRound],
    index: state.index,
    roundNumber: state.roundNumber,
    roundByeTrack: state.roundByeTrack
  };
}

function undoLastSelection() {
  stopByeTimeout();
  if (!state.lastUndoSnapshot) return;

  state.currentRound = [...state.lastUndoSnapshot.currentRound];
  state.nextRound = [...state.lastUndoSnapshot.nextRound];
  state.index = state.lastUndoSnapshot.index;
  state.roundNumber = state.lastUndoSnapshot.roundNumber;
  state.roundByeTrack = state.lastUndoSnapshot.roundByeTrack || null;
  state.lastUndoSnapshot = null;

  saveTournament();
  updateUndoButton();
  showMatch();
}

function vote(choice) {
  stopByeTimeout();

  state.lastUndoSnapshot = createUndoSnapshot();
  updateUndoButton();

  state.nextRound.push(state.currentRound[state.index + choice]);
  state.index += 2;

  saveTournament();
  showMatch();
}

function resetTournament() {
  stopByeTimeout();
  clearTournament();
  clearPendingStart();
  state.accessToken = null;
  resetTournamentData();
  setApp("");
  setStatus("Tournoi réinitialisé.");
}

// -------- RENDER --------
function renderTrack(track, side) {
  const imageUrl = track.album?.images?.[0]?.url || "";
  const artists = (track.artists || []).map(a => a.name).join(", ") || "Artiste inconnu";
  const spotifyUrl = track.external_urls?.spotify || "#";

  return `
    <div style="
      width: 46%;
      display: inline-block;
      vertical-align: top;
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin: 8px;
      box-sizing: border-box;
    ">
      ${imageUrl ? `<a href="${spotifyUrl}" target="_blank" rel="noopener noreferrer"><img src="${imageUrl}" alt="${escapeHtml(track.name)}" width="180" style="border-radius:8px;"></a><br><br>` : ""}
      <div style="font-size:18px; font-weight:bold; margin-bottom:8px;">${escapeHtml(track.name)}</div>
      <div style="margin-bottom:14px;">${escapeHtml(artists)}</div>
      <button onclick="vote(${side})" style="padding:10px 16px; font-size:16px;">Choisir</button>
    </div>
  `;
}

function renderBye(track) {
  const imageUrl = track.album?.images?.[0]?.url || "";
  const artists = (track.artists || []).map(a => a.name).join(", ") || "Artiste inconnu";

  return `
    <div style="
      width: 18%;
      min-width: 140px;
      display: inline-block;
      vertical-align: top;
      text-align: center;
      opacity: 0.75;
      font-size: 12px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      padding: 10px;
      margin: 8px 12px 8px 0;
      box-sizing: border-box;
    ">
      <div style="font-size:11px; font-weight:bold; margin-bottom:8px;">BYE DU TOUR</div>
      ${imageUrl ? `<img src="${imageUrl}" alt="${escapeHtml(track.name)}" width="70" style="border-radius:6px;"><br><br>` : ""}
      <div style="font-weight:bold; margin-bottom:4px;">${escapeHtml(track.name)}</div>
      <div>${escapeHtml(artists)}</div>
    </div>
  `;
}

function showWinner(track) {
  setStatus("");
  setApp(`
    <h2>Gagnant</h2>
    <div style="max-width: 360px;">
      ${renderTrack(track, 0)}
    </div>
  `);
}

function showMatch() {
  stopByeTimeout();
  updateUndoButton();

  if (state.index >= state.currentRound.length) {
    if (state.nextRound.length === 1) {
      const winner = state.nextRound[0];
      clearTournament();
      state.lastUndoSnapshot = null;
      updateUndoButton();
      showWinner(winner);
      return;
    }

    state.currentRound = [...state.nextRound];
    state.nextRound = [];
    state.index = 0;
    state.roundNumber += 1;
    prepareRound();
    saveTournament();
  }

  const a = state.currentRound[state.index];
  const b = state.currentRound[state.index + 1];

  if (!b) {
    setStatus("");
    setApp(`
      <p><b>Tour ${state.roundNumber}</b></p>
      <div style="display:flex; align-items:flex-start; gap:12px;">
        ${renderBye(a)}
        <div style="flex:1; border:1px solid #ddd; border-radius:12px; padding:20px; margin-top:8px;">
          <p style="margin:0; font-size:18px;"><b>${escapeHtml(a.name)}</b> passe automatiquement au tour suivant.</p>
        </div>
      </div>
    `);

    state.nextRound.push(a);
    state.index += 2;
    saveTournament();

    state.byeTimeout = setTimeout(showMatch, CONFIG.byeDelay);
    return;
  }

  setStatus("");
  setApp(`
    <p><b>Tour ${state.roundNumber} — Match ${Math.floor(state.index / 2) + 1}</b></p>
    <div style="display:flex; align-items:flex-start; gap:12px;">
      <div style="width:18%; min-width:140px;">
        ${state.roundByeTrack ? renderBye(state.roundByeTrack) : ""}
      </div>
      <div style="flex:1;">
        ${renderTrack(a, 0)}
        ${renderTrack(b, 1)}
      </div>
    </div>
  `);

  saveTournament();
}

// -------- FLOW --------
async function start() {
  try {
    stopByeTimeout();
    setStatus("Chargement...");

    const playlistUrl = $("playlistUrl").value.trim();
    const playlistId = getPlaylistId(playlistUrl);

    if (!playlistId) throw new Error("Lien de playlist invalide.");

    savePlaylistUrl();

    if (!state.accessToken) {
      state.accessToken = await fetchAccessToken();
    }

    if (!state.accessToken) {
      setPendingStart(true);
      await redirectToAuth();
      return;
    }

    const meta = await getPlaylistMeta(playlistId);
    setStatus(`Lecture de la playlist "${meta.name}"... ${meta.tracks?.total ?? 0} éléments annoncés.`);

    const { tracks, total } = await getAllTracks(playlistId);
    if (tracks.length === 0) {
      throw new Error(`Aucune musique trouvée. Spotify annonce ${total ?? 0} items, mais 0 piste exploitable a été récupérée.`);
    }

    shuffle(tracks);

    resetTournamentData();
    state.currentRound = tracks;
    prepareRound();

    saveTournament();
    showMatch();
  } catch (error) {
    console.error(error);

    if (error.message === "TOKEN_EXPIRED" || error.message === "NOT_AUTHENTICATED") {
      setStatus("Session Spotify expirée, reconnexion...");
      savePlaylistUrl();
      setPendingStart(true);
      await redirectToAuth();
      return;
    }

    setError(error.message || "Erreur inconnue.");
  }
}

async function init() {
  try {
    restorePlaylistUrl();

    const code = getQueryParam("code");
    if (code) {
      setStatus("Connexion Spotify...");
      state.accessToken = await fetchAccessToken();
    }

    if (loadTournament()) {
      showMatch();
      return;
    }

    if (getPendingStart()) {
      clearPendingStart();
      await start();
      return;
    }

    updateUndoButton();
    setStatus("");
  } catch (error) {
    console.error(error);
    setError(error.message || "Erreur au chargement.");
  }
}

window.onload = init;
</script>

</body>
</html>
